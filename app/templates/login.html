<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Bol&atilde;o Hexa 2026 - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <script src="{{ url_for('static', filename='js/login.js') }}" defer></script>
  </head>
  <body class="login-page">
    <main class="login-shell" aria-labelledby="login-title">
      <header class="login-header">
        <img
          class="login-logo"
          src="{{ url_for('static', filename='img/bonassi-logo.svg') }}"
          alt="Bonassi Odontologia Integrada"
          width="216"
          height="196"
        >
        <h1 id="login-title">Bol&atilde;o Hexa 2026</h1>
        <p>Aposte nos jogos do Brasil e desafie seus amigos!</p>
      </header>

      <section class="login-card" aria-label="Formul&aacute;rio de login">
        <form id="login-form" class="login-form" novalidate>
          <div class="field">
            <input id="email" name="email" type="email" autocomplete="email" placeholder=" " required>
            <label for="email">Email</label>
          </div>

          <div class="field">
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder=" " required>
            <label for="password">Senha</label>
          </div>

          <p id="login-feedback" class="login-feedback" role="status" aria-live="polite"></p>

          <button class="login-button" type="submit">
            <span>Entrar</span>
            <span class="button-icon" aria-hidden="true">&rarr;</span>
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
