services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bonassi_web
    env_file:
      - .env
    ports:
      - "${APP_PORT:-5001}:5001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - bonassi_network

  db:
    image: postgres:16-alpine
    container_name: bonassi_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bonassi}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bonassi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bonassi_network

volumes:
  postgres_data:

networks:
  bonassi_network:
    driver: bridge
