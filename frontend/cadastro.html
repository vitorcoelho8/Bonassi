<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Bolao Hexa 2026 - Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Manrope:wght@500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js" defer></script>
    <script src="js/cadastro.js" defer></script>
  </head>
  <body class="auth-page">
    <main class="auth-shell" aria-labelledby="signup-title">
      <header class="auth-header">
        <img class="auth-logo" src="img/bonassi-logo.svg" alt="Bonassi Odontologia Integrada" width="216" height="196">
        <h1 id="signup-title">Cadastro</h1>
        <p>Entre no bolao e acompanhe seus pontos pelo ranking.</p>
      </header>

      <section class="auth-card" aria-label="Formulario de cadastro">
        <form id="register-form" class="stack-form" novalidate>
          <label class="field">
            <span>Nome</span>
            <input name="name" type="text" autocomplete="name" required>
          </label>

          <label class="field">
            <span>Telefone</span>
            <input name="phone" type="tel" autocomplete="tel" inputmode="tel" required>
          </label>

          <p id="register-feedback" class="form-feedback" role="status" aria-live="polite"></p>

          <button class="primary-button" type="submit">Cadastrar</button>
          <a id="visit-profile-link" class="primary-button hidden" href="#">Visitar perfil</a>
          <a class="text-link" href="admin.html">Voltar para o painel</a>
        </form>
      </section>
    </main>
  </body>
</html>
