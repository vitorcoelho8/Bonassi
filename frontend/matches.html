<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Bolao Hexa 2026 - Jogos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Manrope:wght@500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js" defer></script>
    <script src="js/matches.js" defer></script>
  </head>
  <body class="app-page">
    <header class="app-topbar">
      <div class="brand-lockup">
        <img class="profile-avatar" src="img/bonassi-logo.svg" alt="Bonassi">
        <h1>Jogos</h1>
      </div>
      <a class="score-pill" href="ranking.html">Home</a>
    </header>

    <main class="app-content" aria-labelledby="matches-title">
      <section class="page-heading">
        <h2 id="matches-title">Jogos do Brasil</h2>
        <p>Partidas cadastradas para o caminho do Brasil.</p>
        <div class="matches-actions">
          <button id="create-brazil-match-button" class="primary-button add-match-button" type="button">
            <span class="material-symbols-outlined" aria-hidden="true">add</span>
            <span>Criar pr&oacute;xima partida do Brasil</span>
          </button>
        </div>
      </section>

      <p id="matches-feedback" class="form-feedback" aria-live="polite"></p>

      <section class="matches-board" aria-label="Lista de jogos">
        <div class="matches-header">
          <span>Partida</span>
          <span>Fase</span>
          <span>Data</span>
          <span>Status</span>
          <span>Ações</span>
        </div>
        <div id="matches-list" class="matches-list">
          <p class="users-empty">Carregando jogos...</p>
        </div>
      </section>
    </main>

    <dialog id="result-modal" class="result-modal" aria-labelledby="result-modal-title">
      <form id="result-form" class="result-form" method="dialog">
        <div class="result-modal-header">
          <h2 id="result-modal-title">Resultado da partida</h2>
          <button class="icon-action" type="button" data-close-result aria-label="Fechar">
            <span class="material-symbols-outlined" aria-hidden="true">close</span>
          </button>
        </div>

        <div class="result-scoreline">
          <strong id="result-home-team">Mandante</strong>
          <label class="score-input">
            <span class="hidden">Gols do mandante</span>
            <input id="result-home-score" name="home_score" type="number" inputmode="numeric" min="0" step="1" required>
          </label>
          <span class="result-versus">x</span>
          <label class="score-input">
            <span class="hidden">Gols do visitante</span>
            <input id="result-away-score" name="away_score" type="number" inputmode="numeric" min="0" step="1" required>
          </label>
          <strong id="result-away-team">Visitante</strong>
        </div>

        <p id="result-feedback" class="form-feedback" aria-live="polite"></p>

        <div class="result-actions">
          <button class="secondary-button" type="button" data-close-result>Cancelar</button>
          <button class="primary-button" type="submit">Salvar resultado</button>
        </div>
      </form>
    </dialog>

    <dialog id="next-match-modal" class="result-modal" aria-labelledby="next-match-modal-title">
      <form id="next-match-form" class="result-form" method="dialog" novalidate>
        <div class="result-modal-header">
          <h2 id="next-match-modal-title">Criar pr&oacute;xima partida do Brasil</h2>
          <button class="icon-action" type="button" data-close-next-match aria-label="Fechar">
            <span class="material-symbols-outlined" aria-hidden="true">close</span>
          </button>
        </div>

        <label class="field">
          <span>Fase</span>
          <select id="next-match-phase" name="phase" required>
            <option value="">Selecione a fase</option>
          </select>
        </label>

        <label class="field">
          <span>Advers&aacute;rio</span>
          <input id="next-match-opponent" name="opponent_team" type="text" placeholder="Digite o adversario do Brasil" autocomplete="off" required>
        </label>

        <div class="split-fields">
          <label class="field">
            <span>Data</span>
            <input id="next-match-date" name="match_date" type="date" required>
          </label>
          <label class="field">
            <span>Hor&aacute;rio</span>
            <input id="next-match-time" name="match_time" type="time" required>
          </label>
        </div>

        <fieldset class="field bonus-checklist next-match-side">
          <legend>Brasil ser&aacute;</legend>
          <label class="check-option">
            <input type="radio" name="brazil_side" value="HOME" required>
            <span>Mandante</span>
          </label>
          <label class="check-option">
            <input type="radio" name="brazil_side" value="AWAY">
            <span>Visitante</span>
          </label>
        </fieldset>

        <section id="next-match-preview" class="next-match-preview" aria-live="polite"></section>

        <p id="next-match-feedback" class="form-feedback" aria-live="polite"></p>

        <div class="result-actions">
          <button class="secondary-button" type="button" data-close-next-match>Cancelar</button>
          <button class="primary-button" type="submit">Criar partida</button>
        </div>
      </form>
    </dialog>

    <nav class="bottom-nav" aria-label="Navegacao principal">
      <a href="/matches" class="nav-item active" aria-current="page">
        <span class="material-symbols-outlined nav-icon filled" aria-hidden="true">sports_soccer</span>
        <span>Jogos</span>
      </a>
      <a href="ranking.html" class="nav-item">
        <span class="material-symbols-outlined nav-icon" aria-hidden="true">leaderboard</span>
        <span>Ranking</span>
      </a>
      <a href="bonus.html" class="nav-item">
        <span class="material-symbols-outlined nav-icon" aria-hidden="true">workspace_premium</span>
        <span>Bonus</span>
      </a>
      <a href="usuarios.html" class="nav-item">
        <span class="material-symbols-outlined nav-icon" aria-hidden="true">group</span>
        <span>Usuarios</span>
      </a>
    </nav>
  </body>
</html>
