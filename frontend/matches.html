<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Bolao Hexa 2026 - Jogos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Manrope:wght@500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js" defer></script>
    <script src="js/matches.js" defer></script>
  </head>
  <body class="app-page">
    <header class="app-topbar">
      <div class="brand-lockup">
        <img class="profile-avatar" src="img/bonassi-logo.svg" alt="Bonassi">
        <h1>Jogos</h1>
      </div>
      <a class="score-pill" href="ranking.html">Home</a>
    </header>

    <main class="app-content" aria-labelledby="matches-title">
      <section class="page-heading">
        <h2 id="matches-title">Jogos do Brasil</h2>
        <p>Partidas cadastradas para a primeira fase.</p>
      </section>

      <section class="matches-board" aria-label="Lista de jogos">
        <div class="matches-header">
          <span>Partida</span>
          <span>Data</span>
          <span>Status</span>
        </div>
        <div id="matches-list" class="matches-list">
          <p class="users-empty">Carregando jogos...</p>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Navegacao principal">
      <a href="/matches" class="nav-item active" aria-current="page">
        <span class="material-symbols-outlined nav-icon filled" aria-hidden="true">sports_soccer</span>
        <span>Jogos</span>
      </a>
      <a href="ranking.html" class="nav-item">
        <span class="material-symbols-outlined nav-icon" aria-hidden="true">leaderboard</span>
        <span>Ranking</span>
      </a>
      <a href="bonus.html" class="nav-item">
        <span class="material-symbols-outlined nav-icon" aria-hidden="true">workspace_premium</span>
        <span>Bonus</span>
      </a>
      <a href="usuarios.html" class="nav-item">
        <span class="material-symbols-outlined nav-icon" aria-hidden="true">group</span>
        <span>Usuarios</span>
      </a>
    </nav>
  </body>
</html>
